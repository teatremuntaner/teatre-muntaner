# Configuración para desplegar en Netlify (la web nueva).
# En Netlify el sitio va en la raíz del dominio, así que base = "/".
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SITE_BASE = "/"
  NODE_VERSION = "22"
  # PRODUCCIÓN en teatremuntaner.com: indexable (robots Allow + sitemap + sin noindex).
  INDEXABLE = "true"

# Funciones serverless (botón "Actualizar cartelera" del centro de control)
[functions]
  directory = "netlify/functions"

# CORS para funciones.json: lo consume el escaparate (tele.teatremuntaner.com),
# que es OTRO origen. Astro pone la cabecera en el endpoint, pero al prerenderizarse
# a archivo estático se pierde; Netlify la reañade aquí. Sin esto, el navegador
# bloquea el fetch del panel (selector de espectáculo) y de la tele (overlay).
[[headers]]
  for = "/funciones.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
