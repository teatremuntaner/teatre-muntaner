# Configuración para desplegar en Netlify (la web nueva).
# En Netlify el sitio va en la raíz del dominio, así que base = "/".
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SITE_BASE = "/"
  NODE_VERSION = "22"
  # PRODUCCIÓN en teatremuntaner.com: indexable (robots Allow + sitemap + sin noindex).
  INDEXABLE = "true"

# Funciones serverless (botón "Actualizar cartelera" del centro de control)
[functions]
  directory = "netlify/functions"

# --------------------------------------------------------------------------
# Catalán: de Weglot (subdominio) a páginas propias (/ca/)
#
# Hasta el 24/07/2026 el catalán lo servía Weglot en cat.teatremuntaner.com.
# Ahora son páginas reales en teatremuntaner.com/ca/. Estas reglas mandan cada
# URL vieja a su equivalente nueva con un 301, para no perder el posicionamiento
# que ya tiene Google.
#
# OJO: estas reglas NO hacen nada hasta que se cumplan DOS pasos manuales:
#   1) En cdmon: apuntar el CNAME de cat.teatremuntaner.com a Netlify
#      (ahora apunta a Weglot). NO tocar el registro A de la raíz ni los MX.
#   2) En Netlify: añadir cat.teatremuntaner.com como dominio alias del sitio.
# Mientras no se hagan, el subdominio sigue en manos de Weglot.
# --------------------------------------------------------------------------
[[redirects]]
  from = "https://cat.teatremuntaner.com/espectaculos/*"
  to = "https://teatremuntaner.com/ca/espectaculos/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://cat.teatremuntaner.com/*"
  to = "https://teatremuntaner.com/ca/:splat"
  status = 301
  force = true

# --------------------------------------------------------------------------
# Dominio teatremuntaner.cat -> web catalana (/ca/)
#
# Es un DOMINIO aparte (no un subdominio). Se manda entero a /ca/, conservando
# la ruta. Igual que con cat., estas reglas solo hacen efecto cuando:
#   1) En Netlify: teatremuntaner.cat y www.teatremuntaner.cat son alias del sitio.
#   2) En cdmon (zona de teatremuntaner.cat): la RAIZ va con registro A -> 75.2.60.5
#      (un dominio raiz no admite CNAME), y www con CNAME -> teatre-muntaner.netlify.app.
# --------------------------------------------------------------------------
[[redirects]]
  from = "https://teatremuntaner.cat/*"
  to = "https://teatremuntaner.com/ca/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.teatremuntaner.cat/*"
  to = "https://teatremuntaner.com/ca/:splat"
  status = 301
  force = true

# CORS para funciones.json: lo consume el escaparate (tele.teatremuntaner.com),
# que es OTRO origen. Astro pone la cabecera en el endpoint, pero al prerenderizarse
# a archivo estático se pierde; Netlify la reañade aquí. Sin esto, el navegador
# bloquea el fetch del panel (selector de espectáculo) y de la tele (overlay).
[[headers]]
  for = "/funciones.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
