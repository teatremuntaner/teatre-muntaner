name: Sync Qwantic

# Comprueba shows nuevos / fechas en Qwantic y, SOLO si hay cambios, los sube
# (lo que dispara el deploy en Netlify). Así no se gastan créditos en vano.
on:
  schedule:
    - cron: "23 5 * * *"     # cada día ~05:23 UTC (07:23 España). Minuto impar a propósito: los crons a "en punto" se retrasan horas en GitHub
  workflow_dispatch: {}       # botón de ejecución manual (pestaña Actions)

permissions:
  contents: write             # para poder commitear los cambios al repo

concurrency:
  group: sync-qwantic
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Instalar dependencias de Python
        run: pip install --quiet requests pyyaml
      - name: Ejecutar sincronizador
        run: python scripts/sync_qwantic.py
      # Traduce al catalán lo que haya cambiado (Apertium). Si el servicio
      # estuviera caído no bloqueamos el deploy: la web catalana sigue viva y
      # el show nuevo se ve en castellano hasta la siguiente pasada.
      - name: Generar el catalán
        id: catalan
        continue-on-error: true
        run: python scripts/translate_ca.py
      - name: Avisar si la traducción falló
        if: steps.catalan.outcome == 'failure'
        run: echo "::warning::La traducción al catalán falló (Apertium). Se despliega igualmente; revisar y relanzar."
      - name: Subir cambios si los hay
        run: |
          RUTAS="src/content/espectaculos src/content/espectaculos-ca src/i18n"
          if [ -n "$(git status --porcelain $RUTAS)" ]; then
            git config user.name "Teatre Muntaner (bot)"
            git config user.email "info@teatremuntaner.com"
            git add $RUTAS
            git commit -m "Auto-sync Qwantic: fechas y altas de shows (+ catalán)"
            git push
            echo "Cambios subidos -> Netlify desplegará."
          else
            echo "Sin cambios; no se despliega."
          fi

      # La tele del escaparate ya NO se toca desde aquí (11/07/2026): los huecos
      # "automáticos" de la playlist los resuelve la propia pantalla (motor.js)
      # con funciones.json, y todo se edita en el panel (tele.teatremuntaner.com/panel.php).
